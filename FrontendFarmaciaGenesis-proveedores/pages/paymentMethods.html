<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Payment Methods</title>

  <link rel="stylesheet" href="../css/base/styles.css">
  <link rel="stylesheet" href="../css/components/paymentMethods.css">
</head>

<body>

  <div class="main-content">

    <div class="header">
      <button class="btn-back" onclick="goBack()">⬅</button>
      <h2>METODOS DE PAGO</h2>
    </div>

    <button class="btn-agregar" onclick="abrirModal()">Agregar metodo</button>

    <table>
      <thead>
        <tr>
          <th>ID</th>
          <th>Nombre</th>
          <th>Descripción</th>
          <th>Estado</th>
          <th>Acciones</th>
        </tr>
      </thead>
      <tbody id="tablaMetodosPago"></tbody>
    </table>

  </div>

  <div id="modal" class="modal">
    <div class="modal-content">

      <h3>Nuevo Metodo de Pago</h3>

      <div class="form-group">
        <label>Nombre</label>
        <input id="nombre">
      </div>

      <div class="form-group">
        <label>Descripcion</label>
        <input id="descripcion">
      </div>

      <div class="acciones">
        <button onclick="guardar()">Guardar</button>
        <button onclick="cerrarModal()">Cancelar</button>
      </div>

    </div>
  </div>

  <script src="../js/paymentMethods.js"></script>

</body>
</html>
