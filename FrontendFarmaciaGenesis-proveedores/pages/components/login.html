<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login page</title>
  </head>

  <body>
    <div class="continer">
      <div class="continer-form">
        <form class="sing-in">
          <h2>Iniciar sesión</h2>
          <div class="social-networks">
            <ion-icon name="fitness-outline"></ion-icon>
          </div>
          <span>Use su correo y contraseña</span>
          <div class="continer-input">
            <ion-icon name="mail-open-outline"></ion-icon>
            <input type="text" placeholder="Correo" />
          </div>
          <div class="continer-input">
            <ion-icon name="lock-closed-outline"></ion-icon>
            <input type="text" placeholder="Contraseña" />
          </div>
          <a href="#">¿Olvidaste tu contraseña?</a>
          <button type="button" class="button" id="btn-login-submit">
            Iniciar sesión
          </button>
        </form>
      </div>
      <div class="continer-form">
        <form class="sing-up"></form>
      </div>
      <div class="continer-welcome">
        <div class="welcome-sing-up welcome">
          <h3>Bienvenido a Farmacia Génesis</h3>
        </div>
        <div class="welcome-sing-in welcome"></div>
      </div>
    </div>
    <footer class="footer">Farmacia Génesis-Jinotepe</footer>
  </body>
</html>
