<div class="top-bar" id="main-topbar">
  <div class="topbar-left">
    <button
      id="mobile-menu-btn"
      class="menu-toggle"
      aria-label="Abrir menú de navegación"
    >
      <i class="fa-solid fa-bars"></i>
    </button>

    <div class="search-container">
      <i class="fa-solid fa-magnifying-glass"></i>
      <input
        type="text"
        id="globalSearch"
        placeholder="Buscar productos, ventas..."
      />
    </div>
  </div>

  <div class="user-actions">
    <div class="notification-wrapper">
      <button class="icon-btn" id="btnNotificaciones" title="Notificaciones">
        <i class="fa-regular fa-bell"></i>
        <span class="notification-badge" id="alertsCount">0</span> 
      </button>

      <div class="alerts-dropdown" id="alertsDropdown">
        <div class="alerts-header" style="padding: 15px; border-bottom: 1px solid #eee; background: #f8f9fa; border-radius: 8px 8px 0 0;">
          <h3 style="margin: 0; font-size: 0.95rem; font-weight: 600; color: #333;">Alertas de Inventario</h3>
        </div>
        
        <div class="alerts-list" id="homeAlertasList" style="max-height: 350px; overflow-y: auto;">
          </div>
      </div>
    </div>
    <div class="topbar-divider"></div>
    <div class="topbar-user-mini">
      <span class="user-name-mini"></span>
      <div class="avatar-mini"></div>
    </div>
  </div>
</div>
