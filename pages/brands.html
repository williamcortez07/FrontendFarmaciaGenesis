<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Gestión de Marcas | Admin Panel</title>

    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <link rel="shortcut icon" href="favicon.ico" type="image/x-icon" />

    <link rel="stylesheet" href="/css/layout/brands.css" />
  </head>
  <body>
    <main class="container">
      <header class="page-header">
        <div class="header-content">
          <h1>Gestión de Marcas</h1>
          <p>Administra y organiza los proveedores y marcas del sistema.</p>
        </div>
        <button id="btnOpenModal" class="btn btn-primary">
          <i class="fas fa-plus"></i> Nueva Marca
        </button>
      </header>

      <!-- Filtros y Búsqueda (Opcional pero profesional) -->
      <section class="table-tools">
        <div class="search-box">
          <i class="fas fa-search"></i>
          <input type="text" placeholder="Buscar marca..." />
        </div>
      </section>

      <!-- Tabla de Datos -->
      <div class="table-container">
        <table class="styled-table">
          <thead>
            <tr>
              <th>ID</th>
              <th>Nombre</th>
              <th>Descripción</th>
              <th>Estado</th>
              <th class="text-center">Acciones</th>
            </tr>
          </thead>
          <tbody>
            <!-- Ejemplo de fila cargada -->
            <tr>
              <td>#101</td>
              <td><strong>Apple</strong></td>
              <td>Dispositivos electrónicos y software.</td>
              <td><span class="badge status-active">Activo</span></td>
              <td class="text-center">
                <button class="btn-icon edit" title="Editar">
                  <i class="fas fa-edit"></i>
                </button>
                <button class="btn-icon delete" title="Eliminar">
                  <i class="fas fa-trash"></i>
                </button>
              </td>
            </tr>
          </tbody>
        </table>
      </div>

      <!-- Paginación -->
      <nav class="pagination-container">
        <div class="pagination-info">Mostrando 1 a 10 de 50 marcas</div>
        <ul class="pagination">
          <li>
            <button class="page-link" disabled>
              <i class="fas fa-chevron-left"></i>
            </button>
          </li>
          <li><button class="page-link active">1</button></li>
          <li><button class="page-link">2</button></li>
          <li><button class="page-link">3</button></li>
          <li>
            <button class="page-link">
              <i class="fas fa-chevron-right"></i>
            </button>
          </li>
        </ul>
      </nav>
    </main>

    <!-- Modal para Registro -->
    <div id="brandModal" class="modal-overlay">
      <div class="modal-content">
        <header class="modal-header">
          <h2>Registrar Nueva Marca</h2>
          <button id="btnCloseModal" class="close-modal">&times;</button>
        </header>
        <form id="brandForm" class="modal-body">
          <div class="form-group">
            <label for="brandName">Nombre de la Marca</label>
            <input
              type="text"
              id="brandName"
              name="brandName"
              placeholder="Ej: Nike"
              required
            />
          </div>
          <div class="form-group">
            <label for="brandDesc">Descripción</label>
            <textarea
              id="brandDesc"
              name="brandDesc"
              rows="3"
              placeholder="Breve descripción de la marca..."
            ></textarea>
          </div>
          <div class="modal-footer">
            <button
              type="button"
              class="btn btn-secondary"
              onclick="closeModal()"
            >
              Cancelar
            </button>
            <button type="submit" class="btn btn-primary">Guardar Marca</button>
          </div>
        </form>
      </div>
    </div>

    <script>
      // Lógica básica para el Modal
      const modal = document.getElementById("brandModal");
      const btnOpen = document.getElementById("btnOpenModal");
      const btnClose = document.getElementById("btnCloseModal");

      btnOpen.onclick = () => modal.classList.add("active");
      btnClose.onclick = () => modal.classList.remove("active");

      // Cerrar modal si se hace click fuera del contenido
      window.onclick = (event) => {
        if (event.target == modal) {
          modal.classList.remove("active");
        }
      };
    </script>
  </body>
</html>
