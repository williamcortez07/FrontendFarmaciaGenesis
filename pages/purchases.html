<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>compras</title>

    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="../css/base/globals.css" />
    <link rel="stylesheet" href="/css/components/catalog-ui.css" />
    <link rel="stylesheet" href="../css/components/sidebar.css" />
    <link rel="stylesheet" href="../css/components/topbar.css" />
    <link rel="stylesheet" href="../css/components/footer.css" />
    <link rel="stylesheet" href="../css/layout/purchases.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
  </head>
  <body>
    <div class="app-layout">
      <!-- Sidebar -->
      <aside
        id="sidebar-target"
        class="main-sidebar"
        aria-label="Navegación principal"
      >
        <div class="sidebar-placeholder skeleton-loader"></div>
      </aside>

      <!-- Topbar -->
      <div id="header-target" class="main-header" aria-label="Barra superior">
        <div class="header-placeholder skeleton-loader"></div>
      </div>

      <!-- Contenido principal -->
      <main class="main-content" id="main-content">
        <div class="purchases-page">
          <!-- Cabecera de página -->
          <header class="page-header">
            <div class="page-header__title">
              <h1>Gestión de Copras</h1>
              <p>Lleva un control de lo que compras</p>
            </div>
          </header>

          <!-- Toolbar: búsqueda + acción principal -->
          <div class="purchases-search-row" role="search">
            <input
              type="search"
              class="search-input"
              id="purchasesearch"
              placeholder="Buscar compra..."
              aria-label="Buscar compra"
              autocomplete="off"
            />
            <button type="button" class="btn-create" id="btnAddSupp">
              <i class="fa-solid fa-plus" aria-hidden="true"></i>
              Agregar Nuevo
            </button>
          </div>

          <!-- Tabla de compraes -->
          <div
            class="purchases-table-card"
            role="region"
            aria-label="Listado de compraes"
          >
            <table class="purchases-table" aria-label="Tabla de compraes">
              <thead>
                <tr>
                  <th scope="col">ID</th>
                  <th scope="col">nan</th>
                  <th scope="col">nan</th>
                  <th scope="col">nan</th>
                  <th scope="col">nan</th>
                  <th scope="col">nan</th>
                  <th scope="col">Activo</th>
                  <th scope="col" class="col-actions">Acciones</th>
                </tr>
              </thead>
              <tbody></tbody>
            </table>
          </div>
        </div>
      </main>

      <div id="footer-target" class="footer" aria-label="Pie de página">
        <div class="footer-placeholder skeleton-loader"></div>
      </div>

      <div
        id="f-Modal"
        class="purchase-modal"
        role="dialog"
        aria-modal="true"
        aria-labelledby="purchaseModalTitle"
        aria-hidden="true"
      >
        <div
          class="purchase-modal__backdrop"
          data-close-modal
          tabindex="-1"
        ></div>
        <div class="purchase-modal__panel">
          <button
            type="button"
            class="purchase-modal__close"
            data-close-modal
            aria-label="Cerrar modal"
          >
            <i class="fa-solid fa-xmark" aria-hidden="true"></i>
          </button>

          <p id="purchaseModalTitle" class="purchase-modal__intro">
            Complete todos los campos para registrar o actualizar un compra.
          </p>

          <form id="purchaseForm" class="purchase-modal__form" novalidate>
            <div class="purchase-form__row purchase-form__row--3">
              <div class="purchase-field">
                <label for="fieldName">Nombre</label>
                <input
                  type="text"
                  id="fieldName"
                  name="nombre"
                  autocomplete="off"
                  placeholder="Ej: BioFarma"
                />
              </div>
              <div class="purchase-field">
                <label for="fieldRCN">RNC</label>
                <input
                  type="text"
                  id="fieldrcn"
                  name="rcn"
                  autocomplete="off"
                  placeholder="Ej: 90993039300"
                />
              </div>
              <div class="purchase-field">
                <label for="fieldMail">Correo</label>
                <input
                  type="text"
                  id="fieldMail"
                  name="Mail"
                  autocomplete="off"
                  placeholder="Ej: BioFarma@gmail.com"
                />
              </div>
            </div>

            <div class="purchase-form__row purchase-form__row--2">
              <div class="purchase-field">
                <label for="fieldPhone">Teléfono</label>
                <input
                  type="text"
                  id="fieldPhone"
                  name="Phone"
                  autocomplete="off"
                  placeholder="Ej: 7878-3393"
                />
              </div>
              <div class="purchase-field">
                <label for="fieldAddress">Dirección</label>
                <input
                  type="text"
                  id="fieldAddress"
                  name="Address"
                  autocomplete="off"
                  placeholder="Ej: Carretera a Masaya Km 12, Managua"
                />
              </div>
            </div>

            <!-- Acciones del modal -->
            <div class="purchase-modal__actions">
              <button
                type="button"
                class="purchase-btn-cancel"
                id="btnCancelpurchase"
                data-close-modal
              >
                <i class="fa-solid fa-xmark" aria-hidden="true"></i>
                Cancelar
              </button>
              <button
                type="submit"
                class="purchase-btn-save"
                id="btnSavepurchase"
              >
                <i class="fa-solid fa-circle-check" aria-hidden="true"></i>
                Guardar compra
              </button>
            </div>
          </form>
        </div>
      </div>
    </div>
  </body>
  <script src="/js/purchases.js" defer></script>
  <script src="../js/sidebar.js" defer></script>
  <script src="../js/topbar.js" defer></script>
  <script src="../js/footer.js" defer></script>
</html>
