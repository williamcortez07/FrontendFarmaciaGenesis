<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Compras</title>

    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="../css/base/globals.css" />
    <link rel="stylesheet" href="/css/components/catalog-ui.css" />
    <link rel="stylesheet" href="../css/components/sidebar.css" />
    <link rel="stylesheet" href="../css/components/topbar.css" />
    <link rel="stylesheet" href="../css/components/footer.css" />
    <link rel="stylesheet" href="../css/layout/purchases.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
  </head>
  <body>
    <div class="app-layout">
      <aside
        id="sidebar-target"
        class="main-sidebar"
        aria-label="Navegación principal"
      >
        <div class="sidebar-placeholder skeleton-loader"></div>
      </aside>

      <div id="header-target" class="main-header" aria-label="Barra superior">
        <div class="header-placeholder skeleton-loader"></div>
      </div>

      <main class="main-content" style="padding: 20px;">
        <header class="catalog-header" style="margin-bottom: 20px;">
            <h1 class="catalog-title">Registro de Compras (Ingreso a Inventario)</h1>
        </header>

        <section class="purchase-header-section card" style="background: white; padding: 20px; border-radius: 8px; margin-bottom: 20px;">
            <h3 style="margin-bottom: 15px; font-size: 16px;">Datos Generales de la Compra</h3>
            <div class="purchase-form__row purchase-form__row--2">
                <div class="purchase-field">
                    <label for="supplier-select">Proveedor *</label>
                    <select id="supplier-select" class="form-control" required style="width: 100%; padding: 8px; border: 1px solid #ccc; border-radius: 4px;">
                        <option value="">Seleccione un proveedor...</option>
                        </select>
                </div>
                <div class="purchase-field">
                    <label for="observation-input">Observación / N° Factura Física</label>
                    <input type="text" id="observation-input" class="form-control" placeholder="Ej. Factura #001234" style="width: 100%; padding: 8px; border: 1px solid #ccc; border-radius: 4px;">
                </div>
            </div>
        </section>

        <section class="purchase-table-section card" style="background: white; padding: 20px; border-radius: 8px; overflow-x: auto;">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
                <h3 style="font-size: 16px;">Detalle de la Factura</h3>
                <button type="button" class="purchase-btn-save" id="btn-add-detail" style="border: none; cursor: pointer;">
                    <i class="fa-solid fa-plus"></i> Agregar Producto
                </button>
            </div>
            
            <div class="table-responsive">
                <table class="table custom-table" style="width: 100%; border-collapse: collapse; text-align: left;">
                    <thead style="background-color: #f8f9fa; border-bottom: 2px solid #dee2e6;">
                        <tr>
                            <th style="padding: 10px;">Producto</th>
                            <th style="padding: 10px;">Lote</th>
                            <th style="padding: 10px;">F. Vencimiento</th>
                            <th style="padding: 10px;">Cantidad</th>
                            <th style="padding: 10px;">Costo Unit.</th>
                            <th style="padding: 10px;">Subtotal</th>
                            <th style="padding: 10px;">Acciones</th>
                        </tr>
                    </thead>
                    <tbody id="purchase-table-body">
                        <tr>
                            <td colspan="7" style="text-align: center; padding: 20px; color: #6c757d;">
                                
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>

            <div class="purchase-summary" style="margin-top: 20px; display: flex; justify-content: space-between; align-items: center; border-top: 1px solid #eee; padding-top: 15px;">
                <div class="total-display">
                    <h4 style="font-size: 1.2rem; margin: 0;">Total Estimado: <span id="purchase-total-amount" style="color: #198754;">C$ 0.00</span></h4>
                </div>
                <div>
                    <button type="button" class="purchase-btn-save" id="btn-save-purchase" style="background-color: #198754; border: none; cursor: pointer;">
                        <i class="fa-solid fa-check"></i> Guardar Compra y Actualizar Inventario
                    </button>
                </div>
            </div>
        </section>
      </main>

      <div id="footer-target" class="footer" aria-label="Pie de página">
        <div class="footer-placeholder skeleton-loader"></div>
      </div>

      <div
        id="f-Modal"
        class="purchase-modal"
        role="dialog"
        aria-modal="true"
        aria-labelledby="purchaseModalTitle"
        aria-hidden="true"
      >
        <div
          class="purchase-modal__backdrop"
          data-close-modal
          tabindex="-1"
        ></div>
        <div class="purchase-modal__panel">
          <button
            type="button"
            class="purchase-modal__close"
            data-close-modal
            aria-label="Cerrar modal"
          >
            <i class="fa-solid fa-xmark" aria-hidden="true"></i>
          </button>

          <p id="purchaseModalTitle" class="purchase-modal__intro">
            Complete todos los campos para agregar un medicamento a la factura.
          </p>

          <form id="purchaseForm" class="purchase-modal__form" novalidate>
            <div class="purchase-form__row purchase-form__row--3">
              <div class="purchase-field">
                <label for="product-select">Producto *</label>
                <select id="product-select" name="productId" required style="width: 100%; padding: 8px; border: 1px solid #ccc; border-radius: 4px;">
                    <option value="">Seleccione...</option>
                </select>
              </div>
              <div class="purchase-field">
                <label for="batch-input">Número de Lote *</label>
                <input
                  type="text"
                  id="batch-input"
                  name="batchNumber"
                  autocomplete="off"
                  placeholder="Ej: L-998877"
                  required
                />
              </div>
              <div class="purchase-field">
                <label for="qty-input">Cantidad *</label>
                <input
                  type="number"
                  id="qty-input"
                  name="quantity"
                  placeholder="0"
                  min="1"
                  required
                />
              </div>
            </div>

            <div class="purchase-form__row purchase-form__row--3">
              <div class="purchase-field">
                <label for="price-input">Costo Unitario *</label>
                <input
                  type="number"
                  id="price-input"
                  name="unitPrice"
                  placeholder="0.00"
                  step="0.01"
                  min="0.01"
                  required
                />
              </div>
              <div class="purchase-field">
                <label for="mfg-date-input">F. Fabricación</label>
                <input
                  type="date"
                  id="mfg-date-input"
                  name="manufacturingDate"
                />
              </div>
              <div class="purchase-field">
                <label for="exp-date-input">F. Vencimiento *</label>
                <input
                  type="date"
                  id="exp-date-input"
                  name="expirationDate"
                  required
                />
              </div>
            </div>

            <div class="purchase-modal__actions">
              <button
                type="button"
                class="purchase-btn-cancel"
                id="btnCancelpurchase"
                data-close-modal
              >
                <i class="fa-solid fa-xmark" aria-hidden="true"></i>
                Cancelar
              </button>
              <button
                type="submit"
                class="purchase-btn-save"
                id="btnSavepurchase"
              >
                <i class="fa-solid fa-plus" aria-hidden="true"></i>
                Añadir a la lista
              </button>
            </div>
          </form>
        </div>
      </div>
    </div>
  </body>
  <script src="/js/purchases.js" defer></script>
  <script src="../js/sidebar.js" defer></script>
  <script src="../js/topbar.js" defer></script>
  <script src="../js/footer.js" defer></script>
</html>
