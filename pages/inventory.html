<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gestiona tu Inventario</title>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="../css/base/globals.css" />
  <link rel="stylesheet" href="../css/layout/inventory.css" />
  <link rel="stylesheet" href="../css/components/catalog-ui.css" />
  <link rel="stylesheet" href="../css/components/sidebar.css" />
  <link rel="stylesheet" href="../css/components/topbar.css" />
  <link rel="stylesheet" href="../css/components/footer.css" />

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
</head>

<body>
  <div class="app-layout">

    <aside id="sidebar-target" class="main-sidebar" aria-label="Navegación">
      <div class="sidebar-placeholder skeleton-loader"></div>
    </aside>

    <div id="header-target" class="main-header" aria-label="Barra superior">
      <div class="header-placeholder skeleton-loader"></div>
    </div>

    <main class="inventory-container">
      <div class="inventory-header">
        <div>
          <h1>Gestiona tu Inventario</h1>
          <p>Administra y controla los productos de la farmacia.</p>
        </div>
        <div class="header-actions">
          <button class="btn-secondary" id ="btnExportExcel">
            <i class="fas fa-file-excel"></i>
            Exportar
          </button>
        </div>
      </div>

      <section class="stats-container">
        <div class="stat-card">
          <div class="card-icon blue">
            <i class="fas fa-boxes"></i>
          </div>
          <div>
            <h3>Total Productos</h3>
            <span id="totalProducts">0</span>
          </div>
        </div>

        <div class="stat-card">
          <div class="card-icon yellow">
            <i class="fas fa-triangle-exclamation"></i>
          </div>
          <div>
            <h3>Stock Bajo</h3>
            <span id="lowStock">0</span>
          </div>
        </div>

        <div class="stat-card">
          <div class="card-icon red">
            <i class="fas fa-times-circle"></i>
          </div>
          <div>
            <h3>Agotados</h3>
            <span id="outStock">0</span>
          </div>
        </div>

        <div class="stat-card">
          <div class="card-icon green">
            <i class="fas fa-dollar-sign"></i>
          </div>
          <div>
            <h3>Valor Inventario</h3>
            <span id="inventoryValue">C$ 0.00</span>
          </div>
        </div>
      </section>

      <section class="filter-container">
        <div class="search-box">
          <i class="fas fa-search"></i>
          <input type="text" id="searchProduct" placeholder="Buscar producto..." />
        </div>

        <select id="categoryFilter">
          <option value="">Categorías</option>
        </select>

        <select id="statusFilter">
          <option value="">Estado</option>
          <option value="normal">Normal</option>
          <option value="low">Stock Bajo</option>
          <option value="out">Agotado</option>
        </select>

        <button class="btn-filter">Filtrar</button>
      </section>

      <section class="table-container">
        <table>
          <thead>
            <tr>
              <th>ID</th>
              <th>Producto</th>
              <th>Categoría</th>
              <th>Existencia</th>
              <th>Precio</th>
              <th>Estado</th>
              <th>Acciones</th>
            </tr>
          </thead>
          <tbody id="inventoryTableBody">
            <tr>
              <td colspan="7" style="text-align: center;">Cargando inventario...</td>
            </tr>
          </tbody>
        </table>

      </section>
      <nav class="pagination-bar" aria-label="Paginación de Inventario">
        <p class="pagination-bar__info" id="paginationInfo"></p>
        <ul class="pagination" role="list" id="paginationContainer">

        </ul>
      </nav>



      <div id="modalLotes" class="modal-overlay">
        <div class="modal-content">
          <div class="modal-header">
            <h2>Lotes Disponibles: <span id="modalProductoNombre"></span></h2>
            <span class="close-modal">&times;</span>
          </div>
          <div class="modal-body">
            <table class="table-lotes">
              <thead>
                <tr>
                  <th>ID Lote</th>
                  <th>Fecha de Vencimiento</th>
                  <th>Existencia</th>
                  <th>Estado</th>
                </tr>
              </thead>
              <tbody id="tablaLotesBody"></tbody>
            </table>
          </div>
        </div>
      </div>
    </main>

    <div id="footer-target" aria-label="Pie de página">
      <div class="footer-placeholder skeleton-loader"></div>
    </div>

  </div>

  <script src="../js/sidebar.js" defer></script>
  <script src="../js/topbar.js" defer></script>
  <script src="../js/footer.js" defer></script>
  <script type="module" src="../js/inventory.js" defer></script>
  
</body>

</html>
